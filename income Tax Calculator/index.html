<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>income Tax Calculator - Calculate taxes instantly</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator-container">
        <h2>Pakistan Income Tax 2026 🇵🇰</h2>
    
        <div class="input-group">
            <label>Monthly Salary (PKR)</label>
             <input type="number" id="salary" placeholder="e.g. 100,000" oninput="calculateTax()">
        </div>

        <div class="result-box">
            <div class="row">Monthly Tax: <span id="mTax">0</span></div>
            <div class="row">Yearly Tax: <span id="yTax">0</span></div>
            <div class="row highlight">Take-Home Salary: <span id="netPay">0</span></div>
         </div>

    <button onclick="resetAll()">Reset All </button>
</div>
</body>
<script src="script.js"></script>
</html>
