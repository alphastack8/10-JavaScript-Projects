<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6. ⏲️ Countdown Timer - Event countdown tool</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="timer-container">
    <h2>Project Deadline ⏳</h2>
    <div id="countdown">
        <div class="box"><span id="days">00</span><p>Days</p></div>
        <div class="box"><span id="hours">00</span><p>Hours</p></div>
        <div class="box"><span id="minutes">00</span><p>Min</p></div>
        <div class="box"><span id="seconds">00</span><p>Sec</p></div>
    </div>
    <p id="message"></p>
</div>
</body>
<script src="script.js"></script>
</html>
